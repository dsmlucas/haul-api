name: Create pull request to production

on:
  push:
    branches:
      - staging

  workflow_dispatch:

env:
  DESTINATION_BRANCH: "main"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    name: Create pull request to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        run: |
          gh pr create \
            --base ${{ env.DESTINATION_BRANCH }} \
            --head staging \
            --title "Deploy to Production" \
            --body "Automated deployment from staging to production" \
            --draft
        env:
          GH_TOKEN: ${{ github.token }}
